INHERIT: docs/mkdocs-base.yml

site_name: shrinkage
site_description: Linear shrinkage estimators for covariance matrices following Ledoit and Wolf
site_author: Jebel Quant Research
site_url: https://jebel-quant.github.io/shrinkage/
repo_url: https://github.com/Jebel-Quant/shrinkage
repo_name: Jebel-Quant/shrinkage
copyright: Copyright &copy; 2025–2026 Jebel Quant Research

docs_dir: docs

nav:
  - Home: index.md
  - API Reference: api.md
  - Development:
      - Tests: development/TESTS.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Jebel-Quant/shrinkage

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
