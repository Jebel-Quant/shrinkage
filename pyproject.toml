[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shrinkage"
version = "0.1.0"
description = "Linear and nonlinear shrinkage estimators following Ledoit and Wolf"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cvx-linalg>=0.6",
    "numpy>=2.0",
    "polars>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.deptry]
package_module_name_map = {"cvx-linalg" = "cvx"}
per_rule_ignores = {"DEP002" = ["polars", "pytest", "pytest-cov"]}

[tool.hatch.build.targets.wheel]
packages = ["src/shrinkage"]
