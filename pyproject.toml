[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shrinkage"
version = "0.1.0"
description = "Linear and nonlinear shrinkage estimators following Ledoit and Wolf"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cvx-linalg>=0.6",
    "numpy>=2.4.6",
    "polars>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/shrinkage"]
